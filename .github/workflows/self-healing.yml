name: Self-Healing CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  self-heal:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          pip install pyyaml requests
      
      - name: Make reset_demo executable
        run: chmod +x reset_demo.bat
      
      - name: Run Self-Healing Agent
        run: |
          python healing_agent.py demo2/build.log
      
      - name: Commit fixes if any
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add demo2/
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-heal: Fixed build errors"
          git push