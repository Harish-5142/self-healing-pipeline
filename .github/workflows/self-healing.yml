name: Self-Healing Agent Demo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          pip install pyyaml requests
      
      - name: Show files before fix
        run: |
          echo "📁 Checking demo2 folder:"
          ls -la demo2/
          echo ""
          echo "📄 package.json content:"
          cat demo2/package.json
      
      - name: Run Self-Healing Agent
        run: |
          python healing_agent.py demo2/build.log || true
      
      - name: Show files after fix
        run: |
          echo "✅ Fixed files:"
          echo ""
          echo "📄 package.json after:"
          cat demo2/package.json
